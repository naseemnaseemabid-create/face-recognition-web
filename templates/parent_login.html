<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parent Login - Face Recognition AI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0d1117; font-family: 'Segoe UI', sans-serif; color: #e6edf3; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        .login-box { background: #161b22; padding: 40px; border-radius: 12px; width: 400px; border: 1px solid #30363d; }
        h1 { color: #00d4ff; font-size: 24px; margin-bottom: 8px; text-align: center; }
        .subtitle { color: #8b949e; font-size: 13px; margin-bottom: 28px; text-align: center; }
        label { color: #8b949e; font-size: 13px; display: block; margin-bottom: 6px; }
        input { width: 100%; padding: 10px 14px; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: #e6edf3; font-size: 14px; margin-bottom: 18px; }
        input:focus { outline: none; border-color: #00d4ff; }
        button { width: 100%; padding: 12px; background: #00d4ff; color: #000; border: none; border-radius: 6px; font-size: 15px; font-weight: bold; cursor: pointer; }
        button:hover { background: #00b8d9; }
        .flash { padding: 10px; border-radius: 6px; margin-bottom: 16px; font-size: 13px; }
        .flash.success { background: #0a2b1e; color: #3fb950; }
        .flash.danger { background: #2d1b1b; color: #f85149; }
        .back-link { text-align: center; margin-top: 20px; }
        .back-link a { color: #00d4ff; text-decoration: none; font-size: 13px; }
        .icon { text-align: center; font-size: 48px; margin-bottom: 15px; }
        
        @media (max-width: 768px) { .login-box { width: 90%; margin: 20px; } }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="icon">👨‍👩‍👧</div>
        <h1>Parent Portal</h1>
        <p class="subtitle">Track your child's attendance</p>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash {{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        
        <form method="POST">
            <label>📧 Email Address</label>
            <input type="email" name="email" placeholder="parent@example.com" required>
            <label>🔒 Password</label>
            <input type="password" name="password" placeholder="••••••••" required>
            <button type="submit">Login →</button>
        </form>
        
        <div class="back-link">
            <a href="/login">← Back to Teacher Login</a>
        </div>
    </div>
</body>
</html>
